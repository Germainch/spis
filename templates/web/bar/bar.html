<div class="bar-inner">
  <ul class="bar-filter-list-main">
    <li class="bar-filter-item bar-breadcrumb-container">
      <nav class="bar-breadcrumb" aria-label="Directory path">
        {% for (label, path) in breadcrumbs %}
        <span hx-get="/hx/bar/navigate?path={{ path|urlencode }}"
          hx-target="#hx-main" hx-swap="outerHTML"
          class="link bar-breadcrumb-segment">{{ label }}</span>
        {% if !loop.last %}<span class="bar-breadcrumb-sep">›</span>{% endif %}
        {% endfor %}
      </nav>
    </li>
  </ul>
  <input name="collection" value="{{ collection }}" type="hidden" />
</div>
