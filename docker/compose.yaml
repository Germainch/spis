services:
  spis:
    build:
      context: ..
      dockerfile: docker/dev.Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPIS_PROCESSING_SCHEDULE: "0 0 2 * * *"
      SPIS_PROCESSING_RUN_ON_START: "false"
      SPIS_FEATURE_FAVORITE: "false"
      SPIS_FEATURE_ARCHIVE: "false"
      SPIS_FEATURE_FOLLOW_SYMLINKS: "true"
      RUST_LOG: "error,spis=info"
    volumes:
      - "./spis_data:/var/lib/spis/data"
      - "./spis_media:/var/lib/spis/media"